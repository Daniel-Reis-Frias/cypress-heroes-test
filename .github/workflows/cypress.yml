name: Cypress Tests CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cypress-run:
    name: Run Cypress Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 📦 Instalar dependências
        run: npm install

      - name: 🏗️ Build da aplicação
        run: npx tsc --skipLibCheck && npx vite build --mode development

      - name: 🧪 Executar testes Cypress
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          install: false
          working-directory: client
          start: npx vite preview --port 3000
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 60

      - name: 📊 Fazer upload dos screenshots (em caso de falha)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: client/cypress/screenshots
          if-no-files-found: ignore

      - name: 🎥 Fazer upload dos vídeos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: client/cypress/videos
          if-no-files-found: ignore
